{% extends "base.html" %}
{% block title %}Đăng nhập - Phụ kiện điện thoại{% endblock %}
{% block content %}
<h2 style="font-family:'Cormorant Garamond',serif;margin:18px 0 10px;">Đăng nhập</h2>
{% if loi %}<div class="err">{{ loi }}</div>{% endif %}
<form method="post" class="formbox">
  {% csrf_token %}
  <p>Tên đăng nhập:<br><input class="input" name="username" placeholder="Ví dụ: minh123"></p>
  <p>Mật khẩu:<br><input class="input" name="password" type="password" placeholder="******"></p>
  <button class="btn primary" type="submit">Đăng nhập</button>
  <a class="btn" href="{% url 'dang_ky' %}">Chưa có tài khoản?</a>
</form>
{% endblock %}
